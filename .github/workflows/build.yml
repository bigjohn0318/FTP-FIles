name: Build signed FOSS release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform & build-tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_STORE_FILE_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/release.keystore.jks"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build and sign release APK
        id: gradle_build
        continue-on-error: true
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore.jks
        run: |
          ./gradlew :app:assembleFossRelease --no-daemon --stacktrace > build_log.txt 2>&1 || echo "GRADLE_FAILED=1" >> "$GITHUB_ENV"
          tail -n 400 build_log.txt

      - name: Push build log to ci-logs branch (always, for debugging)
        if: always()
        run: |
          git config user.email "ci-bot@example.com"
          git config user.name "CI Bot"
          git checkout --orphan ci-logs-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          mkdir -p ci-logs
          cp build_log.txt "ci-logs/build_log_${GITHUB_RUN_ID}.txt"
          git add "ci-logs/build_log_${GITHUB_RUN_ID}.txt"
          git commit -m "ci log for run ${GITHUB_RUN_ID} [skip ci]"
          git push origin ci-logs-tmp:ci-logs --force

      - name: Fail job if gradle build failed
        if: env.GRADLE_FAILED == '1'
        run: exit 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-manager-foss-release-apk
          path: app/build/outputs/apk/foss/release/*.apk
          if-no-files-found: error

      - name: Push APK to release-apk branch (for direct retrieval)
        run: |
          APK_PATH=$(find app/build/outputs/apk/foss/release -name "*.apk" | head -n 1)
          cp "$APK_PATH" "$RUNNER_TEMP/output.apk"
          git config user.email "ci-bot@example.com"
          git config user.name "CI Bot"
          git checkout --orphan release-apk-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          mkdir -p release
          cp "$RUNNER_TEMP/output.apk" "release/file-manager-network-${GITHUB_RUN_ID}.apk"
          git add "release/file-manager-network-${GITHUB_RUN_ID}.apk"
          git commit -m "release apk for run ${GITHUB_RUN_ID} [skip ci]"
          git push origin release-apk-tmp:release-apk --force
